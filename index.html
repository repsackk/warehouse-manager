<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Warehouse Manager ERP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="mainDashboard" class="min-h-screen flex flex-col">
        <header class="bg-white shadow-sm p-4 px-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">📦 System Magazynowy ERP</h1>
                <p class="text-xs text-gray-500">Zalogowany jako: <span id="navUser" class="font-bold text-blue-600"></span> (<span id="navRole" class="uppercase"></span>)</p>
            </div>
            <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 cursor-pointer font-medium text-sm transition">Wyloguj</button>
        </header>

        <div class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
            
            <div class="lg:col-span-1">
                <form id="invoiceForm" class="bg-white p-4 lg:p-5 rounded-lg shadow-sm border border-gray-200 max-w-full overflow-hidden">
                    <h2 class="text-xl font-bold mb-4 text-gray-800">Wystaw Fakturę</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nazwa klienta / Firmy</label>
                            <input type="text" id="invClientName" required class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">NIP</label>
                            <input type="text" id="invClientNip" class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Ulica</label>
                                <input type="text" id="invoiceClientStreet" class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Nr domu</label>
                                <input type="text" id="invoiceClientHomeNumber" class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Kod</label>
                                <input type="text" id="invoiceClientPostcode" placeholder="00-000" class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                            </div>
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Miasto</label>
                                <input type="text" id="invoiceClientCity" class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                            </div>
                        </div>
                    </div>

                    <hr class="my-6">

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700">Dodaj produkt</label>
                        <div class="flex flex-wrap gap-2 mt-1">
                            <select id="invProductSelect" class="flex-1 min-w-0 p-2 border border-gray-300 rounded outline-none"></select>
                            <input type="number" id="invProductQty" value="1" min="1" class="w-20 p-2 border border-gray-300 rounded outline-none">
                            <button type="button" onclick="addItemToInvoice()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 cursor-pointer font-bold">+</button>
                        </div>
                    </div>

                    <ul id="invoiceItemsList" class="space-y-2 mb-6 max-h-64 overflow-y-auto overflow-x-hidden break-words">
                        <li class="text-gray-400 italic text-center">Brak pozycji.</li>
                    </ul>

                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700 cursor-pointer transition">
                        Wystaw Fakturę i Drukuj
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-gray-800">Magazyn</h2>
                        <button onclick="openAddModal()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold hover:bg-blue-700 cursor-pointer">Dodaj Produkt</button>
                    </div>
                    
                    <input type="text" id="productSearch" placeholder="🔍 Szukaj produktu (nazwa lub SKU)..." class="w-full mb-4 p-2 border border-gray-300 rounded outline-none">

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="border-b text-gray-500 text-sm">
                                <th class="p-3">SKU</th><th class="p-3">Nazwa</th><th class="p-3">Kategoria</th><th class="p-3">Cena</th><th class="p-3">Stan</th><th class="p-3 text-right">Akcje</th>
                            </tr></thead>
                            <tbody id="productsTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="adminPanel" class="hidden bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-2 text-red-600">Panel Administratora</h2>
                    <p class="text-sm text-gray-600 mb-4">Wnioski o dostęp pracowników:</p>
                    <ul id="unapprovedUsersList" class="divide-y divide-gray-100"></ul>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <form id="editForm" class="bg-white p-6 rounded shadow-lg w-full max-w-sm">
            <h2 id="modalTitle" class="text-lg font-bold mb-4">Edytuj produkt</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="Nazwa" required class="w-full mb-2 p-2 border rounded">
            <input type="text" id="editSku" placeholder="SKU" required class="w-full mb-2 p-2 border rounded">
            <input type="text" id="editCategory" placeholder="Kategoria" class="w-full mb-2 p-2 border rounded">
            <input type="number" id="editPrice" step="0.01" placeholder="Cena" required class="w-full mb-2 p-2 border rounded">
            <input type="number" id="editStock" placeholder="Stan magazynowy" required class="w-full mb-4 p-2 border rounded">
            <div class="flex gap-2">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Zapisz</button>
                <button type="button" onclick="closeEditModal()" class="bg-gray-300 px-4 py-2 rounded">Anuluj</button>
            </div>
        </form>
    </div>

    <div id="authScreen" class="hidden min-h-screen flex items-center justify-center fixed inset-0 bg-gray-100 z-50">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">📦 Magazyn ERP - Logowanie</h1>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Użytkownik</label>
                    <input type="text" id="authUsername" required class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium">Hasło</label>
                    <input type="password" id="authPassword" required class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" onclick="setAuthAction('login')" class="flex-1 bg-blue-600 text-white p-2 rounded hover:bg-blue-700 cursor-pointer font-medium">Zaloguj się</button>
                    <button type="submit" onclick="setAuthAction('register')" class="flex-1 bg-gray-500 text-white p-2 rounded hover:bg-gray-600 cursor-pointer font-medium">Rejestracja</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
