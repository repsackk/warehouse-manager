<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Manager - CRUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📦 Warehouse Manager</h1>
            <p class="text-gray-600">System zarządzania magazynem (Vanilla JS + PHP API)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md h-fit">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Dodaj produkt</h2>
                <form id="productForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nazwa produktu</label>
                        <input type="text" id="name" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Kod SKU</label>
                        <input type="text" id="sku" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Cena (PLN)</label>
                            <input type="number" id="price" step="0.01" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Ilość</label>
                            <input type="number" id="stock" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Kategoria</label>
                        <input type="text" id="category" required class="mt-1 block w-full p-2 border border-gray-300 rounded shadow-sm outline-none">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition font-medium cursor-pointer">
                        Zapisz w magazynie
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-md">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-2">
                    <h2 class="text-xl font-semibold text-gray-700">Stan magazynowy</h2>
                    <div class="flex gap-2 text-sm">
                        <button onclick="sortProducts('price')" class="bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded text-gray-700 font-medium cursor-pointer transition">
                            💰 Sortuj po cenie
                        </button>
                        <button onclick="sortProducts('category')" class="bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded text-gray-700 font-medium cursor-pointer transition">
                            📁 Sortuj po kategorii
                        </button>
                    </div>
                </div>
                
                <p class="text-xs text-gray-400 mb-2">💡 Wskazówka: Złap wiersz myszką i przeciągnij go w górę lub w dół, aby zmienić kolejność!</p>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">SKU</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nazwa</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Kategoria</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Cena</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Stan</th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Akcje</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody" class="bg-white divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
