<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Warehouse Manager ERP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="authScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">📦 Magazyn ERP - Logowanie</h1>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Użytkownik</label>
                    <input type="text" id="authUsername" required class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium">Hasło</label>
                    <input type="password" id="authPassword" required class="w-full mt-1 p-2 border border-gray-300 rounded outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" onclick="setAuthAction('login')" class="flex-1 bg-blue-600 text-white p-2 rounded hover:bg-blue-700 cursor-pointer transition font-medium">Zaloguj się</button>
                    <button type="submit" onclick="setAuthAction('register')" class="flex-1 bg-gray-500 text-white p-2 rounded hover:bg-gray-600 cursor-pointer transition font-medium">Zarejestruj (Sprzedawca)</button>
                </div>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden min-h-screen flex flex-col">
        <header class="bg-white shadow-sm p-4 px-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">📦 System Magazynowy ERP</h1>
                <p class="text-xs text-gray-500">Zalogowany jako: <span id="navUser" class="font-bold text-blue-600"></span> (<span id="navRole" class="uppercase"></span>)</p>
            </div>
            <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 cursor-pointer font-medium text-sm transition">Wyloguj</button>
        </header>

        <div class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
            
            <div class="space-y-6">
                <div id="adminPanel" class="hidden bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-lg font-bold mb-4 text-red-600">👑 Panel Administratora</h2>
                    <p class="text-xs text-gray-400 mb-3">Zatwierdzanie kont nowych sprzedawców:</p>
                    <ul id="unapprovedUsersList" class="space-y-2 divide-y divide-gray-100">
                        </ul>
                </div>

                <div id="sellerPanel" class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-lg font-bold mb-4 text-green-600">📄 Wystaw Nową Fakturę</h2>
                    <form id="invoiceForm" class="space-y-3">
                        <div>
                            <label class="block text-xs font-semibold">Nazwa Klienta / Firmy</label>
                            <input type="text" id="invClientName" required class="w-full mt-1 p-2 border border-gray-300 rounded text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold">NIP Klienta (Opcjonalnie)</label>
                            <input type="text" id="invClientNip" class="w-full mt-1 p-2 border border-gray-300 rounded text-sm outline-none">
                        </div>
                        <hr class="border-gray-100">
                        <div class="grid grid-cols-3 gap-2 items-end">
                            <div class="col-span-2">
                                <label class="block text-xs font-semibold">Wybierz Produkt</label>
                                <select id="invProductSelect" class="w-full mt-1 p-2 border border-gray-300 rounded text-sm outline-none bg-white">
                                    </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold">Ilość</label>
                                <input type="number" id="invProductQty" min="1" value="1" class="w-full mt-1 p-2 border border-gray-300 rounded text-sm outline-none">
                            </div>
                        </div>
                        <button type="button" onclick="addItemToInvoice()" class="w-full bg-gray-800 text-white p-1.5 rounded text-xs font-bold hover:bg-gray-900 cursor-pointer">
                            + Dodaj pozycję do listy
                        </button>

                        <div class="mt-2">
                            <p class="text-xs font-bold text-gray-500 mb-1">Pozycje na dokumencie:</p>
                            <ul id="invoiceItemsList" class="text-xs space-y-1 bg-gray-50 p-2 rounded max-h-32 overflow-y-auto">
                                <li class="text-gray-400 italic text-center">Brak dodanych pozycji.</li>
                            </ul>
                        </div>

                        <button type="submit" class="w-full bg-green-600 text-white p-2 rounded text-sm font-bold hover:bg-green-700 cursor-pointer transition mt-2">
                            Wystaw i Zatwierdź Fakturę
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-md h-fit">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-700">🔍 Podgląd Magazynu (Dostępność)</h2>
                    <div class="flex gap-2 text-xs">
                        <button onclick="sortProducts('price')" class="bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded font-medium cursor-pointer">💰 Cena</button>
                        <button onclick="sortProducts('category')" class="bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded font-medium cursor-pointer">📁 Kategoria</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500">SKU</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500">Nazwa</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500">Kategoria</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500">Cena</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500">Dostępność</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody" class="bg-white divide-y divide-gray-200 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
